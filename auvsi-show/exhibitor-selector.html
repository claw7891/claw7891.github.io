        document.addEventListener('DOMContentLoaded', function() {
            const exhibitorsList = document.getElementById('exhibitorsList');
            const searchInput = document.getElementById('searchInput');
            const selectAllBtn = document.getElementById('selectAllBtn');
            const deselectAllBtn = document.getElementById('deselectAllBtn');
            const selectionCounter = document.getElementById('selectionCounter');
            const submitButton = document.getElementById('submitButton');
            const resultsSection = document.getElementById('resultsSection');
            const resultsJson = document.getElementById('resultsJson');
            const copyBtn = document.getElementById('copyBtn');
            const closeResultsBtn = document.getElementById('closeResultsBtn');
            
            let filteredIds = new Set(exhibitors.map(e => e.id));
            
            function renderExhibitors(filterText) {
                exhibitorsList.innerHTML = '';
                const lowerFilter = filterText ? filterText.toLowerCase() : '';
                
                const filtered = filterText
                    ? exhibitors.filter(e => 
                        e.name.toLowerCase().includes(lowerFilter) ||
                        e.description.toLowerCase().includes(lowerFilter) ||
                        e.boothNumber.toLowerCase().includes(lowerFilter) ||
                        e.boothNumber.toLowerCase().includes(lowerFilter.replace(/[^0-9]/g, ''))
                      )
                    : exhibitors;
                
                filteredIds = new Set(filtered.map(e => e.id));
                
                if (filtered.length === 0) {
                    exhibitorsList.innerHTML = '<div class="no-results">No exhibitors match your search.</div>';
                    updateCounter();
                    return;
                }
                
                filtered.forEach(exhibitor => {
                    const element = document.createElement('div');
                    element.className = 'exhibitor-item';
                    element.innerHTML = `
                        <input type="checkbox" class="exhibitor-checkbox" data-id="${exhibitor.id}">
                        <div class="exhibitor-info">
                            <div class="exhibitor-name">${escapeHtml(exhibitor.name)}</div>
                            <div class="exhibitor-meta">
                                <span class="booth-badge">Booth ${escapeHtml(exhibitor.boothNumber)}</span>
                                ${exhibitor.website ? '<span class="exhibitor-website"><a href="' + escapeHtml(exhibitor.website) + '" target="_blank" rel="noopener">' + escapeHtml(exhibitor.website) + '</a></span>' : ''}
                            </div>
                            <div class="exhibitor-description">${escapeHtml(exhibitor.description)}</div>
                        </div>
                    `;
                    exhibitorsList.appendChild(element);
                });
                
                updateCounter();
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function updateCounter() {
                const checkboxes = document.querySelectorAll('.exhibitor-checkbox');
                const checked = document.querySelectorAll('.exhibitor-checkbox:checked');
                const totalVisible = checkboxes.length;
                selectionCounter.textContent = checked.length + ' of ' + exhibitors.length + ' selected';
            }
            
            function updateCounterFromState() {
                const checkboxes = document.querySelectorAll('.exhibitor-checkbox');
                const checked = document.querySelectorAll('.exhibitor-checkbox:checked');
                selectionCounter.textContent = checked.length + ' of ' + exhibitors.length + ' selected';
            }
            
            // Search
            searchInput.addEventListener('input', function() {
                renderExhibitors(this.value);
            });
            
            // Select All (visible only)
            selectAllBtn.addEventListener('click', function() {
                const checkboxes = document.querySelectorAll('.exhibitor-checkbox');
                checkboxes.forEach(cb => cb.checked = true);
                updateCounter();
            });
            
            // Deselect All
            deselectAllBtn.addEventListener('click', function() {
                const checkboxes = document.querySelectorAll('.exhibitor-checkbox');
                checkboxes.forEach(cb => cb.checked = false);
                updateCounter();
            });
            
            // Delegate change events
            document.addEventListener('change', function(e) {
                if (e.target.classList.contains('exhibitor-checkbox')) {
                    updateCounter();
                }
            });
            
            // Submit
            submitButton.addEventListener('click', function() {
                const selectedExhibitors = [];
                const checkboxes = document.querySelectorAll('.exhibitor-checkbox:checked');
                
                checkboxes.forEach(checkbox => {
                    const exhibitorId = parseInt(checkbox.dataset.id);
                    const exhibitor = exhibitors.find(ex => ex.id === exhibitorId);
                    if (exhibitor) {
                        selectedExhibitors.push({
                            id: exhibitor.id,
                            name: exhibitor.name,
                            boothNumber: exhibitor.boothNumber,
                            description: exhibitor.description,
                            website: exhibitor.website || ''
                        });
                    }
                });
                
                resultsJson.textContent = JSON.stringify(selectedExhibitors, null, 2);
                resultsSection.classList.add('active');
                
                // Scroll to results
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
            
            // Copy to clipboard
            copyBtn.addEventListener('click', function() {
                const text = resultsJson.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const origText = copyBtn.textContent;
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => { copyBtn.textContent = origText; }, 2000);
                });
            });
            
            // Close results
            closeResultsBtn.addEventListener('click', function() {
                resultsSection.classList.remove('active');
            });
            
            // Initial render
            renderExhibitors('');
        });
    </script>
</body>
</html>
